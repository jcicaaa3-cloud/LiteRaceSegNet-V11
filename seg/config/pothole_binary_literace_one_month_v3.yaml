seed: 42
device: cuda
num_workers: 0
save_dir: seg/runs/literace_one_month_v3

data:
 root: datasets/pothole_binary/processed
 class_names:
  - background
  - pothole
 ignore_index: 255
 mask_positive_threshold: 0
 mask_ignore_values: []
 allow_fuzzy_filename_match: true
 fuzzy_match_threshold: 0.82

model:
 name: lite_race
 num_classes: 2
 use_aux: true
 base_channels: 24
 context_channels: 96
 use_detail_branch: true
 context_module: lite_aspp
 liteaspp_rates: [1, 2, 4]
 use_boundary_gate: true
 fuse_boundary_logit: true

train:
 image_size: [288, 448]
 batch_size: 4
 epochs: 80
 amp: true
 base_lr: 0.00028
 weight_decay: 0.00025
 grad_clip: 1.0
 print_freq: 1
 early_stopping_patience: 14
 boundary_width: 3
 # V3 policy: keep the original architecture, reduce road-texture over-detection pressure.
 # If damage recall collapses, use the balanced profile below instead of changing the model structure.
 class_weights: [0.60, 0.40]
 augmentation:
  horizontal_flip_p: 0.5
  brightness_delta: 0.06
  contrast_range: 0.10
  gaussian_noise_std: 0.012
 loss:
  ce_weight: 1.0
  dice_weight: 0.30
  aux_weight: 0.18
  boundary_weight: 0.12

val:
 batch_size: 2
 threshold: 0.65

optimizer:
 name: adamw

scheduler:
 name: poly
 power: 0.9
 min_lr: 0.000001

infer:
 overlay_alpha: 0.45
 threshold: 0.65
 min_area_pixels: 180
 palette:
  - [30, 30, 30]
  - [255, 90, 0]
