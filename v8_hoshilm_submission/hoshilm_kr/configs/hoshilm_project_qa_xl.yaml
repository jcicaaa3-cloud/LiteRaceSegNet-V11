# HoshiLM Project QA - BIG PARAMETER default for AWS GPU runs.
# Purpose: actually increase model capacity for the Project QA assistant.
# Actual parameter scale with bundled SentencePiece vocab≈660: ~85.96M params.
# This is much larger than hoshilm_project_qa.yaml (~11.03M params).
# Use this after run_project_qa_build.sh. It is still a project/toy-scale LLM, not a commercial-scale LLM.
seed: 42
device: auto
dtype: bfloat16
tokenizer: sentencepiece
sp_model_path: tokenizer/sp.model
vocab_size_override: 660
data_path: data/data_project_qa.txt
out_dir: runs/hoshilm_project_qa_xl
train_ratio: 0.92
block_size: 512
n_layer: 12
n_head: 12
n_embd: 768
dropout: 0.10
bias: true
tie_weights: true
batch_size: 1
gradient_accumulation_steps: 32
learning_rate: 0.00018
weight_decay: 0.10
grad_clip: 1.0
max_iters: 8000
eval_interval: 200
eval_iters: 20
save_interval: 500
sample_prompt: "질문: 데이터는 몇 장인가?\n답변:"
sample_tokens: 260
temperature: 0.7
top_k: 50
